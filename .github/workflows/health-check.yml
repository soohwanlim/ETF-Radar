name: Check deployed ETF data health

on:
  workflow_dispatch:
  schedule:
    # Check after the next-morning KST fallback collection has had time to deploy.
    - cron: '0 0 * * 2-6' # 09:00 KST Tue-Sat

permissions:
  contents: read
  issues: write

concurrency:
  group: daily-etf-data  # 이전 수집 작업과 꼬이지 않도록 고유 그룹을 유지하거나 통일합니다.
  cancel-in-progress: false

jobs:
  check:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          
      - run: npm ci
      
      - name: Check deployed status
        id: health
        continue-on-error: true
        env:
          STATUS_URL: ${{ vars.STATUS_URL }}
        run: npm run check:health
        
      - name: Write health summary
        shell: bash
        run: |
          echo "## ETF deployed data health" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Result: ${{ steps.health.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Status URL: ${STATUS_URL:-https://etf-radar.net/data/status.json}" >> "$GITHUB_STEP_SUMMARY"
        env:
          STATUS_URL: ${{ vars.STATUS_URL }}
          
      - name: Open stale data issue
        if: steps.health.outcome == 'failure'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          STATUS_URL: ${{ vars.STATUS_URL }}
        run: |
          title="ETF deployed data health check failed - $(date -u +%Y-%m-%d)"
          existing="$(gh issue list --state open --search "$title in:title" --json number --jq '.[0].number // empty')"
          status_url="${STATUS_URL:-https://etf-radar.net/data/status.json}"
          
          body="The deployed ETF data health check failed.
          
          Run: $RUN_URL
          Status JSON: $status_url
          
          This usually means the deployed status data is stale, incomplete, or reports partial failures.
          
          First checks:
          - Did the 06:00 KST or 08:00 KST fallback collection workflow succeed?
          - Is the latest expected KRX trading day a market holiday, or is status.json actually behind that trading day?
          - Did Cloudflare Pages finish deploying after the data commit?
          - Is KRX/Naver temporarily delayed or unavailable?"
          
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "Another health check failed: $RUN_URL"
            exit 1
          fi
          
          gh issue create --title "$title" --body "$body"
          exit 1
