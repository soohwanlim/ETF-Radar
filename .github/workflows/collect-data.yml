name: Collect daily ETF data

on:
  workflow_dispatch:
  schedule:
    - cron: '10 9 * * 1-5'
    - cron: '10 10 * * 1-5'

permissions:
  contents: write

concurrency:
  group: daily-etf-data
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npm run collect:data
        env:
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}

      - name: Write collection summary
        shell: bash
        run: |
          if [ -f public/data/status.json ]; then
            node -e "const s=require('./public/data/status.json'); console.log('## ETF collection\n\n- Date: '+s.asOf+'\n- State: '+s.state+'\n- ETFs: '+s.etfCount+'\n- Changes: '+s.changeCount+'\n- Failures: '+s.failedCount)" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit changed data
        shell: bash
        run: |
          if git diff --quiet -- public/data; then
            echo "No new ETF data"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data
          git commit -m "chore: update daily ETF data"
          git push
