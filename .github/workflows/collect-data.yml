name: Collect daily ETF data

on:
  workflow_dispatch:
  schedule:
    - cron: '10 9 * * 1-5'
    - cron: '10 10 * * 1-5'

permissions:
  contents: write
  issues: write

concurrency:
  group: daily-etf-data
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npm run collect:data
        env:
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}

      - name: Write collection summary
        shell: bash
        run: |
          if [ -f public/data/status.json ]; then
            node -e "const s=require('./public/data/status.json'); console.log('## ETF collection\n\n- Date: '+s.asOf+'\n- State: '+s.state+'\n- Last check: '+(s.lastCheckedAt || 'n/a')+'\n- Latest KRX date: '+(s.latestAvailableAsOf || s.asOf || 'n/a')+'\n- Check result: '+(s.lastCheckState || 'n/a')+'\n- ETFs: '+s.etfCount+'\n- Changes: '+s.changeCount+'\n- Failures: '+s.failedCount)" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit changed data
        shell: bash
        run: |
          if git diff --quiet -- public/data; then
            echo "No new ETF data"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data
          git commit -m "chore: update daily ETF data"
          git push

      - name: Open failure issue
        if: failure()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          title="ETF data collection failed - $(date -u +%Y-%m-%d)"
          existing="$(gh issue list --state open --search "$title in:title" --json number --jq '.[0].number // empty')"
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "Another scheduled collection failed: $RUN_URL"
            exit 0
          fi
          body="The scheduled ETF data collection workflow failed.

Run: $RUN_URL

Check the failed step logs first. If the failure is a KRX/Naver temporary outage, rerun the workflow manually after a few minutes."
          gh issue create --title "$title" --body "$body"
